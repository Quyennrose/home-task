services:
  - type: web
    name: hometask-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: HOMETASK_DB_DRIVER
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: HOMETASK_TOKEN_SECRET
        generateValue: true
      - key: PGSSL
        value: true
